# ===== Base de datos PostgreSQL =====
# Los valores se toman de variables de entorno. Lo que esta despues de ":" es
# el valor por defecto para correr en local; en Render se sobreescriben.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rate_my_prof}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:miranda}

# ===== JPA / Hibernate =====
# El esquema es de Flyway (db/migration): Hibernate solo valida que las
# entidades coincidan con las tablas.
spring.jpa.hibernate.ddl-auto=validate
# Hibernate detecta el dialecto de PostgreSQL automaticamente.
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

# ===== Flyway =====
# En una base vacia (ej: Neon recien creada) corren V1 (esquema) y V2 (seed).
# En una base pre-Flyway (la local, creada por ddl-auto=update y ya sembrada
# por el viejo DataSeeder) no hay historial: baseline-on-migrate la marca en
# la version 2 sin ejecutar nada, para no duplicar el catalogo. Solo las
# migraciones V3+ corren en ambas.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=2

# ===== Servidor =====
# Render asigna el puerto via la variable PORT; en local usa 8080.
server.port=${PORT:8080}

# ===== Thymeleaf =====
spring.thymeleaf.cache=false
