# ===== Base de datos PostgreSQL =====
# Los valores se toman de variables de entorno. Lo que esta despues de ":" es
# el valor por defecto para correr en local; en Render se sobreescriben.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rate_my_prof}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:miranda}

# ===== JPA / Hibernate =====
# El esquema es de Flyway (db/migration): Hibernate solo valida que las
# entidades coincidan con las tablas.
spring.jpa.hibernate.ddl-auto=validate
# Hibernate detecta el dialecto de PostgreSQL automaticamente.
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

# ===== Flyway =====
# Sin baseline: toda base arranca vacia y corre V1 (esquema), V2 (seed) y las
# que sigan. Si Flyway encuentra tablas pero ningun historial, ahora FALLA en
# vez de asumir en que version esta, que es lo que queremos.
#
# Hubo aca un baseline-on-migrate=true + baseline-version=2 para adoptar la
# base local pre-Flyway sin re-sembrarla. Cumplio su proposito (esa base ya
# tiene historial real V1/V2) y se retiro porque le estampaba "ya estas en la
# version 2" a CUALQUIER base sin historial: Neon tenia un esquema viejo y
# distinto, se comio el sello, se salteo V1+V2 y quedo invalida contra las
# entidades (la app moria en el validate al arrancar).

# ===== Login con Google (OAuth2 / OIDC) =====
# El client-id NO es secreto (viaja en la URL del navegador en cada login), asi
# que puede vivir en el repo. El client-secret SI lo es: sin default, se carga
# como variable en Render. El repo es publico: nada secreto entra aca.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:761889219757-4rghsfesepbfcjg2uv2bmsno8jl0j4eg.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
# A donde vuelve Google al terminar. Cuelga de /api/ para pasar por el proxy
# (ver SecurityConfig). Tiene que coincidir EXACTO con lo cargado en Google Cloud.
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH_REDIRECT_URI:http://localhost:5173/api/login/oauth2/code/google}

# ===== App =====
# Email que recibe rol ADMIN al entrar. Sin default a proposito: es un mail
# personal y el repo es publico. Se carga como variable (ADMIN_EMAIL) en Render
# y en local. Vacio = nadie es admin.
app.admin-email=${ADMIN_EMAIL:}
# A donde mandar a la persona despues del login. En produccion es Vercel.
app.front-url=${FRONT_URL:http://localhost:5173}

# ===== Servidor =====
# Render asigna el puerto via la variable PORT; en local usa 8080.
server.port=${PORT:8080}
