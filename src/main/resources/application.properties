# ===== Base de datos PostgreSQL =====
# Los valores se toman de variables de entorno. Lo que esta despues de ":" es
# el valor por defecto para correr en local; en Render se sobreescriben.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rate_my_prof}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
# Hibernate detecta el dialecto de PostgreSQL automaticamente.
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

# ===== Servidor =====
# Render asigna el puerto via la variable PORT; en local usa 8080.
server.port=${PORT:8080}

# ===== Thymeleaf =====
spring.thymeleaf.cache=false
