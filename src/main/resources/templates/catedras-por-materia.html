<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${materiaNombre} + ' - Rate My Prof'">Materia</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav>
        <div>
            <a href="/" class="brand">Rate My Prof</a>
            <a th:href="@{/materias}">Materias</a>
        </div>
        <div>
            <a sec:authorize="isAnonymous()" th:href="@{/login}">Iniciar sesión</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/logout}">Cerrar sesión</a>
        </div>
    </nav>

    <div class="container">
        <a th:href="@{/materias}" style="color: #666; text-decoration: none;">← Volver a materias</a>
        <h2 style="margin: 1rem 0;" th:text="${materiaNombre}">Fonética Inglesa</h2>
        <p style="margin-bottom: 1.5rem; color: #666;">Cátedras ordenadas por rating (de mayor a menor)</p>

        <div th:each="cat : ${catedras}" class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h3>
                        <a th:href="@{/catedra/{id}(id=${cat.catedraId})}" style="text-decoration: none; color: #2c3e50;">
                            <span th:text="${cat.apellidoProfesor + ', ' + cat.nombreProfesor}">García, María</span>
                        </a>
                    </h3>
                    <span class="rating-count" th:text="${cat.cantidadReviews} + ' review(s)'">3 reviews</span>
                </div>
                <div class="rating-bar">
                    <span class="stars" th:text="${'★'.repeat(cat.promedioRating.intValue())}">★★★</span>
                    <span class="stars-empty" th:text="${'★'.repeat(5 - cat.promedioRating.intValue())}">★★</span>
                    <span class="rating-number" th:text="${#numbers.formatDecimal(cat.promedioRating, 1, 1)}">3.5</span>
                </div>
            </div>
        </div>

        <p th:if="${#lists.isEmpty(catedras)}" style="color: #999;">
            No hay cátedras cargadas para esta materia.
        </p>
    </div>
</body>
</html>
