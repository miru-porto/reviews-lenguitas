<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Materias - Rate My Prof</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav>
        <div>
            <a href="/" class="brand">Rate My Prof - Lenguas Vivas</a>
            <a th:href="@{/materias}">Materias</a>
        </div>
        <div>
            <span sec:authorize="isAuthenticated()" sec:authentication="name" style="color:white; margin-right:1rem;"></span>
            <a sec:authorize="isAnonymous()" th:href="@{/login}">Iniciar sesión</a>
            <a sec:authorize="isAnonymous()" th:href="@{/registro}">Registrarse</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/logout}">Cerrar sesión</a>
        </div>
    </nav>

    <div class="container">
        <h2 style="margin-bottom: 1rem;">Materias</h2>
        <p style="margin-bottom: 1.5rem; color: #666;">Elegí una materia para ver las cátedras y sus reviews.</p>

        <div th:each="materia : ${materias}">
            <a th:href="@{/materias/{id}(id=${materia.id})}" class="materia-link"
               th:text="${materia.nombre}">Fonética Inglesa</a>
        </div>

        <p th:if="${#lists.isEmpty(materias)}" style="color: #999;">
            No hay materias cargadas todavía.
        </p>
    </div>
</body>
</html>
