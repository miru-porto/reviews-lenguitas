<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrarse - Rate My Prof</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav>
        <div><a href="/" class="brand">Rate My Prof - Lenguas Vivas</a></div>
        <div><a th:href="@{/login}">Iniciar sesión</a></div>
    </nav>

    <div class="container" style="max-width: 400px;">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">Crear cuenta</h2>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="card">
            <form th:action="@{/registro}" method="post">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" name="nombre" placeholder="Tu nombre" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" name="password" minlength="6" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Registrarse</button>
            </form>
        </div>

        <p style="text-align: center; margin-top: 1rem;">
            ¿Ya tenés cuenta? <a th:href="@{/login}">Iniciá sesión</a>
        </p>
    </div>
</body>
</html>
