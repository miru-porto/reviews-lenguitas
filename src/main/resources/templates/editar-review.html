<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar review - Rate My Prof</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav>
        <div><a href="/" class="brand">Rate My Prof</a></div>
        <div><a th:href="@{/logout}">Cerrar sesión</a></div>
    </nav>

    <div class="container">
        <a th:href="@{/catedra/{id}(id=${catedra.catedraId})}" style="color: #666; text-decoration: none;">← Volver</a>

        <h2 style="margin: 1rem 0;">Editar review</h2>
        <p style="color: #666; margin-bottom: 1.5rem;">
            <span th:text="${catedra.apellidoProfesor + (#strings.isEmpty(catedra.nombreProfesor) ? '' : ', ' + catedra.nombreProfesor)}">Prof</span>
            — <span th:text="${catedra.materiaNombre}">Materia</span>
        </p>

        <div class="card">
            <form th:action="@{/review/{id}/editar(id=${reviewId})}" th:object="${reviewForm}" method="post">
                <div class="form-group">
                    <label>Puntuación</label>
                    <select th:field="*{puntuacion}">
                        <option value="">Elegí una puntuación</option>
                        <option value="1">★ — Muy malo</option>
                        <option value="2">★★ — Malo</option>
                        <option value="3">★★★ — Regular</option>
                        <option value="4">★★★★ — Bueno</option>
                        <option value="5">★★★★★ — Excelente</option>
                    </select>
                    <span th:if="${#fields.hasErrors('puntuacion')}" th:errors="*{puntuacion}" class="field-error"></span>
                </div>
                <div class="form-group">
                    <label>Cuatrimestre cursado</label>
                    <select th:field="*{cuatrimestre}">
                        <option value="">Elegí el cuatrimestre</option>
                        <option th:each="c : ${opcionesCuatrimestre}" th:value="${c}" th:text="${c}"></option>
                    </select>
                    <span th:if="${#fields.hasErrors('cuatrimestre')}" th:errors="*{cuatrimestre}" class="field-error"></span>
                </div>
                <div class="form-group">
                    <label>Tu opinión</label>
                    <textarea th:field="*{comentario}" placeholder="Contá tu experiencia con este profesor..."></textarea>
                    <span th:if="${#fields.hasErrors('comentario')}" th:errors="*{comentario}" class="field-error"></span>
                </div>
                <button type="submit" class="btn btn-success">Guardar cambios</button>
            </form>
        </div>
    </div>
</body>
</html>
