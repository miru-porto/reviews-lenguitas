<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión - Rate My Prof</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav>
        <div><a href="/" class="brand">Rate My Prof - Lenguas Vivas</a></div>
        <div><a th:href="@{/registro}">Registrarse</a></div>
    </nav>

    <div class="container" style="max-width: 400px;">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">Iniciar sesión</h2>

        <div th:if="${param.error}" class="alert alert-error">Email o contraseña incorrectos.</div>
        <div th:if="${param.registrado}" class="alert alert-success">¡Cuenta creada! Ya podés iniciar sesión.</div>

        <div class="card">
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="username" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Entrar</button>
            </form>
        </div>

        <p style="text-align: center; margin-top: 1rem;">
            ¿No tenés cuenta? <a th:href="@{/registro}">Registrate</a>
        </p>
    </div>
</body>
</html>
