<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Review - Rate My Prof</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav>
        <div><a href="/" class="brand">Rate My Prof</a></div>
        <div><a th:href="@{/logout}">Cerrar sesión</a></div>
    </nav>

    <div class="container">
        <a th:href="@{/catedra/{id}(id=${catedra.id})}" style="color: #666; text-decoration: none;">← Volver</a>

        <h2 style="margin: 1rem 0;">Dejar review</h2>
        <p style="color: #666; margin-bottom: 1.5rem;">
            <span th:text="${catedra.profesor.apellido + ', ' + catedra.profesor.nombre}">Prof</span>
            — <span th:text="${catedra.materia.nombre}">Materia</span>
        </p>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="card">
            <div th:action="@{/review/nueva/{id}(id=${catedra.id})}" th:attr="data-action=@{/review/nueva/{id}(id=${catedra.id})}">
                <form th:action="@{/review/nueva/{id}(id=${catedra.id})}" method="post">
                    <div class="form-group">
                        <label>Puntuación</label>
                        <select name="puntuacion" required>
                            <option value="">Elegí una puntuación</option>
                            <option value="1">★ — Muy malo</option>
                            <option value="2">★★ — Malo</option>
                            <option value="3">★★★ — Regular</option>
                            <option value="4">★★★★ — Bueno</option>
                            <option value="5">★★★★★ — Excelente</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Tu opinión</label>
                        <textarea name="comentario" placeholder="Contá tu experiencia con este profesor..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-success">Publicar review</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
